# BMAD Status Template — Canonical Reference
# This file is the single source of truth for BMAD project state.
# Location: workspace/references/bmad/status-template.yaml
#
# Usage: Copy this template to your project's ./bmad/status.yaml
# Command: cp workspace/references/bmad/status-template.yaml <project>/bmad/status.yaml

# ── Core Identity ─────────────────────────────────────────────────────────────
project: proton-mail-bridge
phase: release
progress: 100

# ── Chain Protocol (CRITICAL) ─────────────────────────────────────────────────
# These three fields MUST stay in sync. Inconsistency = broken chain.
next_action: "Sprint 5 complete — 221/221 tests pass. All sprints done. Ready for release."
next_command: "bmad-status"
next_role: "scrum"
active_role: "dev"

# ── Dependencies (optional) ───────────────────────────────────────────────────
dependencies: []

# ── Phase Tracking ────────────────────────────────────────────────────────────
phases:
  - name: planning
    status: done
  - name: development
    status: in_progress
  - name: testing
    status: in_progress
  - name: release
    status: pending

# ── Strategic Dimensions (updated at end of every action) ─────────────────────
marketing:
  - "Sprint 6 complete: packaging & deployment — 4/4 stories, 198/198 tests pass"
  - "Windows service via NSSM — auto-start with Windows, log rotation"
  - "Linux systemd user service — Restart=on-failure, journalctl logs"
  - "Cross-platform installer: python scripts/install.py"
  - "System tray icon (pystray) — status indicator + bridge control"

product:
  - "All Sprint 6 acceptance criteria met"
  - "Windows: install-service-windows.ps1 (install/uninstall/start/stop/status)"
  - "Linux: install-service-linux.sh + proton-bridge.service unit file"
  - "Cross-platform: install.py detects OS, installs deps, generates config"
  - "Tray: --tray flag, colored status icon, menu control"

far_vision:
  - "Sprint 5 deferred: IMAP IDLE event-driven via Proton EventLoop"
  - "Release candidate v1.0.0 ready — all core features complete"
  - "Future: desktop tray app enhancements, unified inbox, attachment handling"

